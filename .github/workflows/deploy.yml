name: Deploy BipdeepAI
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Deploy BipdeepAI
        env:
          API_KEY: ${{ secrets.GITHUB_API_KEY }} # use secret variable
        run: |
          python -m pip install requests
          python -c "
            import api_utils
            print(api_utils.deploy_bipdeepai('${{ secrets.GITHUB_API_KEY }}').json())
          "
