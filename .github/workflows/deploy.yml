name: Deploy BipdeepAI
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Deploy BipdeepAI
        env:
          APP_ID: ${{ secrets.APP_ID }} # use secret variable
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }} # use secret variable
        run: |
          python -m pip install pygithub requests
          python -c "
            import api_utils
            print(api_utils.deploy_bipdeepai().json())
          "
